name: Daily Discord Count

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
      - name: Restore GM history
        uses: actions/cache/restore@v4
        with:
          path: .gm_history.json
          key: gm-history-${{ github.run_id }}
          restore-keys: |
            gm-history-
      - name: Install dependencies
        run: npm ci
      - run: node scripts/daily-count.js
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          CHANNEL_ID: ${{ vars.CHANNEL_ID }}
          TIMEZONE: "Asia/Tokyo"
          EXCLUDE_BOTS: "false"
          EXCLUDE_USER_IDS: ""
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_MODEL:  ${{ vars.GEMINI_MODEL }}
          GEMINI_TIMEOUT_MS: ${{ vars.GEMINI_TIMEOUT_MS }}
      - name: Save GM history
        uses: actions/cache/save@v4
        with:
          path: .gm_history.json
          key: gm-history-${{ github.run_id }}
